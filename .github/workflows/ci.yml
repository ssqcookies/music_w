
name: Frontend Build CI

# 触发条件：每次 push 代码，或提 Pull Request 时
on:
  push:
    branches: [ "main", "dev" ]  # 根据你的主分支名调整
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取你的代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境（用你项目对应的版本）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16  # 👈 改成你本地用的版本（如 16, 18, 20）
          cache: 'npm'      # 自动缓存 node_modules，加速下次构建

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. 运行 ESLint（可选，如果 lint 脚本存在）
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true  # 即使 lint 失败也继续（可删掉这行让它严格）

      # 5. 构建项目（这里用你项目的实际命令！）
      - name: Build project
        run: npm run build  # 👈 改成你常用的 build 命令！

      # 6. （可选）把构建产物保存下来，方便下载查看
      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/  # 默认 Vite 输出到 dist，如果不是请改
